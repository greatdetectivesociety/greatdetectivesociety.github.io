/* >> reset */
html, body, div, span, h1, p, a, ol, li, audio {
	border: 0;
	font: inherit;

	margin: 0;
	padding: 0;

a[href], a[href]:active, a[href]:visited {

}
a[href]:hover, a[href]:focus {

/* << reset */

/* page style */
.page {
	position: relative;
	margin: 0 auto;
	width: 70%;
	min-width: 300px;
	max-width: 700px;
}
.ellipsis {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Audio Player */
.player-wrap {
    position: sticky;
    top:0%; 
	margin: 0 0 1em;
	padding: 0;
    background:#e9f0e2 url(images/jb_bg.png) center/cover no-repeat;
    color:#ffffff;
}
.player-wrap.enabled {
	padding-bottom: 2em;
}
.player-wrap .button {
	float: left;
	display: none;
	width: 8em;
	line-height: 5em;
	text-align: center;
	border-radius: 5%;
}
.player-wrap .button:hover {
  background-color: #444;
	cursor: pointer;
}
.player-wrap.enabled .button {
	display: block;
}
.player-wrap .info {
    margin: auto;
    text-align: center;
    color:#3b3838;
    padding: 2rem;
}

.player-wrap h1 {
    margin-top: 2em;
    font-size: 1.7rem;
}


.player-wrap .action {
	font-style: italic;
}
.player-wrap .player {
	position: absolute;
  display: none;
	left: 0;
	bottom: 0;
	padding: 0 1em 0 6em;
	width: 100%;
	height: 1em;
	background-color: #C5D5EC;
	font-size: 2em;
	box-sizing: border-box;
}
.player-wrap.enabled .player {
	display: block; 
}
.player-wrap .player svg {
	margin: .25em;
  margin-bottom: 1rem;
	width: .5em;
	height: .5em;
	fill: currentColor;
}
.player-wrap .player div {
	display: block;
	height: 1em;
}
.player-wrap audio,
.player-wrap .player .pause {
	display: none;
}
.player-wrap .playpause, .player-wrap .timer,
.player-wrap .prev, .player-wrap .next {
	position: absolute;
	left: 0;
	bottom: 0;
	display: block;
	height: 1em;
	line-height: 1em;
	vertical-align: top;
	text-align: center;
}
.player-wrap .playpause,
.player-wrap .prev, .player-wrap .next {
	width: 1em;
	cursor: pointer;
}
.player-wrap .playpause {
	left: 1em;
}
.player-wrap .next {
	left: auto;
	right: 0;
}
.player-wrap .playpause:hover,
.player-wrap .prev:hover, .player-wrap .next:hover {
	background-color: #b2c9eb8a;
}
.player-wrap .playpause, .player-wrap .play, .player-wrap .pause,
.player-wrap .prev::-moz-focus-inner,
.player-wrap .next::-moz-focus-inner {
	border: 0;
	padding: 0;
}
.player-wrap .timer {
	left: 2em;
	width: 4em;
}
.player-wrap .timer div {
	display: inline-block;
	height: 100%;
	vertical-align: top;
	font-size: .45em;
}
.player-wrap .seek {
	box-sizing: border-box;
	margin: 0;
	padding: 0;
	width: 100%;
	height: 100%;
}
.playlist-wrap {
    overflow-y: auto;

<script>
// HTML5 audio player + playlist controls
var jsPlayer = document.querySelector('.player-wrap');
if (jsPlayer) {
    jsPlayer = {
        wrap: jsPlayer,
        player: (jsPlayer.querySelector('audio') || {}),
        play: jsPlayer.querySelector('.play'),
        pause: jsPlayer.querySelector('.pause'),
        seek: jsPlayer.querySelector('.seek'),
        prev: jsPlayer.querySelector('.prev'),
        next: jsPlayer.querySelector('.next'),
        button: jsPlayer.querySelector('.button'),
        wrapList: document.querySelector('.playlist-wrap'),
        action: jsPlayer.querySelector('.action'),
        title: jsPlayer.querySelector('.title'),
        current: jsPlayer.querySelector('.current'),
        duration: jsPlayer.querySelector('.duration'),
        playlist: [],
        tracks: [],
        trackCount: 0,
        playing: false,
        seeking: null,
        idx: 0
    };


    jsPlayer.updateAction = function() {
        jsPlayer.action.textContent = jsPlayer.playing ? "Now Playing…" : "Paused…";
    };

    jsPlayer.playClicked = function() {
        jsPlayer.pause.style.display = 'block';
        jsPlayer.play.style.display = 'none';
        jsPlayer.playing = true;
        jsPlayer.updateAction();
        jsPlayer.player.play();
        jsPlayer.updateSeek();
    };

    jsPlayer.pauseClicked = function() {
        jsPlayer.pause.style.display = 'none';
        jsPlayer.play.style.display = 'block';
        jsPlayer.playing = false;
        jsPlayer.updateAction();
        jsPlayer.player.pause();
    };

    jsPlayer.loadPlaylist = function() {
        jsPlayer.playlist = jsPlayer.wrapList.querySelectorAll('ol > li');
        jsPlayer.playlist.forEach((li, i) => {
            let a = li.querySelector('a');
            if (a) {
                li.dataset.idx = i;
                jsPlayer.tracks.push({
                    file: a.href,
                    name: a.textContent.trim(),
                    track: i + 1
                });
                jsPlayer.trackCount++;
            }
        });
    };

    jsPlayer.loadTrack = function(idx) {
        jsPlayer.playlist.forEach(li => li.classList.remove('sel'));
        jsPlayer.playlist[idx].classList.add('sel');

        jsPlayer.title.textContent = jsPlayer.tracks[idx].name;
        jsPlayer.player.src = jsPlayer.tracks[idx].file;

        let img = jsPlayer.button.querySelector("img");
        if (songImages[idx]) img.src = songImages[idx];

        jsPlayer.updateAction();
    };

    jsPlayer.playTrack = function(idx) {
        jsPlayer.loadTrack(idx);
        jsPlayer.playing = true;
        jsPlayer.playClicked();
    };

    jsPlayer.init = function() {
        jsPlayer.loadPlaylist();

        jsPlayer.player.addEventListener('ended', function() {
            if (jsPlayer.idx + 1 < jsPlayer.trackCount) {
                jsPlayer.idx++;
                jsPlayer.playTrack(jsPlayer.idx);
            } else {
                jsPlayer.idx = 0;
                jsPlayer.playing = false;
                jsPlayer.loadTrack(0);
                jsPlayer.player.pause();
                jsPlayer.updateAction();
            }
        });

        jsPlayer.player.addEventListener('loadeddata', function() {
            jsPlayer.setDuration();
        });

        jsPlayer.play.addEventListener('click', jsPlayer.playClicked);
        jsPlayer.pause.addEventListener('click', jsPlayer.pauseClicked);

        jsPlayer.prev.addEventListener('click', function() {
            if (jsPlayer.idx > 0) jsPlayer.idx--;
            jsPlayer.loadTrack(jsPlayer.idx);
            if (jsPlayer.playing) jsPlayer.player.play();
            jsPlayer.updateAction();
        });

        jsPlayer.next.addEventListener('click', function() {
            if (jsPlayer.idx + 1 < jsPlayer.trackCount) jsPlayer.idx++;
            jsPlayer.loadTrack(jsPlayer.idx);
            if (jsPlayer.playing) jsPlayer.player.play();
            jsPlayer.updateAction();
        });

        jsPlayer.seek.addEventListener('mousedown', function() {
            clearTimeout(jsPlayer.seeking);
            jsPlayer.player.pause();
            jsPlayer.updateAction();
        });

        jsPlayer.seek.addEventListener('mouseup', function() {
            jsPlayer.player.currentTime = jsPlayer.seek.value * jsPlayer.player.duration / 100;
            if (jsPlayer.playing) jsPlayer.player.play();
            jsPlayer.updateAction();
        });

        jsPlayer.wrapList.addEventListener('click', function(event) {
            let li = event.target.closest("li");
            if (!li) return;
            jsPlayer.idx = parseInt(li.dataset.idx);
            jsPlayer.playTrack(jsPlayer.idx);
            jsPlayer.updateAction();
        });

        jsPlayer.setDuration = function() {
            jsPlayer.duration.textContent = jsPlayer.formatTime(jsPlayer.player.duration);
            jsPlayer.current.textContent = jsPlayer.formatTime(jsPlayer.player.currentTime);
        };

        jsPlayer.updateSeek = function() {
            jsPlayer.current.textContent = jsPlayer.formatTime(jsPlayer.player.currentTime);
            jsPlayer.seek.value = 100 * jsPlayer.player.currentTime / jsPlayer.player.duration;
            if (jsPlayer.playing) jsPlayer.seeking = setTimeout(jsPlayer.updateSeek, 500);
        };

        jsPlayer.formatTime = function(v) {
            v = Math.floor(v);
            let h = Math.floor(v / 3600);
            v -= h * 3600;
            let m = Math.floor(v / 60);
            let s = v - m * 60;
            return (h ? h + ":" : "") + (m < 10 ? "0" : "") + m + ":" + (s < 10 ? "0" : "") + s;
        };

        jsPlayer.loadTrack(jsPlayer.idx);
        jsPlayer.updateAction(); // Always visible on startup
        jsPlayer.wrap.classList.add('enabled');
    };
